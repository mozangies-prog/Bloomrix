<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Fix for environments where window.fetch is a getter-only property
      // and libraries (like socket.io or polyfills) try to overwrite it.
      (function() {
        try {
          const descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
          if (descriptor && descriptor.get && !descriptor.set) {
            if (descriptor.configurable) {
              const originalFetch = window.fetch;
              Object.defineProperty(window, 'fetch', {
                get: () => originalFetch,
                set: (val) => { 
                  console.warn('Something tried to overwrite window.fetch. Ignored.'); 
                },
                configurable: true
              });
              console.log('window.fetch was a getter-only property. Added a dummy setter.');
            } else {
              console.warn('window.fetch is a getter-only property and NOT configurable.');
            }
          }
        } catch (e) {
          console.warn('Could not fix window.fetch descriptor:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
